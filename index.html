<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are You a Millionaire Yet?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Are You a Millionaire Yet?</h1>
        <p class="subtitle">Enter your net worth in USD and find out which currencies make you a millionaire.</p>

        <form id="net-worth-form">
            <div class="input-group">
                <span class="dollar-sign">$</span>
                <input type="text" id="net-worth" placeholder="Enter your net worth in USD here" inputmode="decimal" autocomplete="off">
                <button type="submit">Find Out</button>
            </div>
        </form>

        <div id="result-banner" class="banner hidden">
            <span id="banner-text"></span>
            <button id="check-it-out" class="check-btn hidden">Check it out</button>
        </div>

        <div id="results" class="hidden">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Currency</th>
                        <th>Your Worth</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="currency-table"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
